<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            padding:40px;
        }

        .container{
            width:100%;
            max-width:1100px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            border-radius:25px;
            padding:40px;
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 25px 45px rgba(0,0,0,.35);
        }

        .title{
            text-align:center;
            color:white;
            margin-bottom:35px;
        }

        .title h1{
            font-size:40px;
            font-weight:700;
        }

        .title p{
            margin-top:8px;
            color:#d8d8d8;
        }

        form{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:22px;
        }

        .input-box{
            display:flex;
            flex-direction:column;
        }

        .input-box label{
            color:white;
            margin-bottom:8px;
            font-size:14px;
            font-weight:500;
        }

        .input-box input,
        .input-box select{

            padding:14px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,0.15);
            color:white;
            outline:none;
            font-size:15px;
            transition:.3s;
        }

        .input-box input::placeholder{
            color:#d7d7d7;
        }

        .input-box input:focus,
        .input-box select:focus{

            background:rgba(255,255,255,.22);
            transform:translateY(-2px);
            box-shadow:0 0 10px rgba(0,255,255,.4);

        }

        select option{
            color:black;
        }

        .button{
            grid-column:1/-1;
            display:flex;
            justify-content:center;
            margin-top:20px;
        }

        button{

            width:250px;
            padding:16px;
            border:none;
            border-radius:50px;
            font-size:18px;
            font-weight:600;
            cursor:pointer;

            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;

            transition:.35s;

        }

        button:hover{

            transform:translateY(-4px);
            box-shadow:0 10px 30px rgba(0,114,255,.45);

        }

        .prediction{

            margin-top:35px;
            text-align:center;
            color:white;
            font-size:24px;
            font-weight:600;

        }

    </style>

</head>
<body>

<div class="container">

    <div class="title">
        <h1>Forest Fire Prediction</h1>
        <p>Enter the environmental parameters below</p>
    </div>

    <form action="{{url_for('predict_datapoint')}}" method="post">

        <div class="input-box">
            <label>Temperature (°C)</label>
            <input type="number" step="any" name="Temperature" placeholder="Temperature" required>
        </div>

        <div class="input-box">
            <label>Relative Humidity (%)</label>
            <input type="number" step="any" name="RH" placeholder="Humidity" required>
        </div>

        <div class="input-box">
            <label>Wind Speed</label>
            <input type="number" step="any" name="Ws" placeholder="Wind Speed" required>
        </div>

        <div class="input-box">
            <label>Rain (mm)</label>
            <input type="number" step="0.01" name="Rain" placeholder="Rainfall" required>
        </div>

        <div class="input-box">
            <label>FFMC</label>
            <input type="number" step="any" name="FFMC" placeholder="FFMC" required>
        </div>

        <div class="input-box">
            <label>DMC</label>
            <input type="number" step="any" name="DMC" placeholder="DMC" required>
        </div>

        <div class="input-box">
            <label>ISI</label>
            <input type="number" step="any" name="ISI" placeholder="ISI" required>
        </div>


        <div class="input-box">
            <label>Classes</label>
            <select name="Classes" required>
                <option value="">Select</option>
                <option value="0">No Fire</option>
                <option value="1">Fire</option>
            </select>
        </div>

        <div class="input-box">
            <label>Region</label>
            <select name="Region" required>
                <option value="">Select Region</option>
                <option value="0">Bejaia</option>
                <option value="1">Sidi Bel-Abbes</option>
            </select>
        </div>

        <div class="button">
            <button type="submit">
                Predict
            </button>
        </div>

    </form>

</div>

</body>
</html>
