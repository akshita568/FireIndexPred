<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            padding: 40px;
        }
        .result-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border-radius: 25px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 45px rgba(0,0,0,.35);
            text-align: center;
            color: white;
        }
        .title h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 25px;
        }
        .prediction-value {
            font-size: 48px;
            font-weight: 700;
            color: #00c6ff;
            margin: 20px 0;
            text-shadow: 0 0 15px rgba(0, 198, 255, 0.4);
        }
        .prediction-text {
            font-size: 18px;
            color: #d8d8d8;
            margin-bottom: 35px;
        }
        .btn-back {
            display: inline-block;
            text-decoration: none;
            width: 220px;
            padding: 14px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            transition: .35s;
        }
        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,114,255,.45);
        }
    </style>
</head>
<body>

<div class="result-container">
    <div class="title">
        <h1>Analysis Complete</h1>
    </div>
    
    <div class="prediction-value">
        {{ final_result }}
    </div>
    
    <p class="prediction-text">Estimated Fire Weather Index value based on provided atmospheric and regional logs.</p>
    
    <a href="{{ url_for('predict_datapoint') }}" class="btn-back">Run Another Test</a>
</div>

</body>
</html>
